<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Brawl Stars Ranked Counterpick Calculator</title>
<meta name="robots" content="index, follow" />
<meta name="description" content="Quickly calculate and find the best Brawl Stars ranked counter-picks. Counterpicks are heavily influenced by SpenLC tierlists for credibility.">
<link rel="canonical" href="https://brawlcalculator.com/" />
<meta property="og:site_name" content="Brawlstars Calculator">
<link rel="icon" type="image/x-icon" href="chester-favicon.ico">
<script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "Brawler Counterpick Calculator",
    "description": "Brawl Stars counter-pick calculator for best brawlstars counters in ranked.",
    "operatingSystem": "Web",
    "applicationCategory": "GameApplication",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
    "url": "https://brawlcalculator.com/"
  }
</script>
<script>
  (function () {
    const botRe = /(googlebot|bingpreview|duckduckbot|baiduspider|yandex|slurp|google-site-verification|adsbot|google-inspectiontool)/i;
    if (botRe.test(navigator.userAgent)) return;
    const pyo = document.createElement('script');
    pyo.src = 'https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js';
    pyo.onload = () => {
      const app = document.createElement('script');
      app.type = 'module';
      app.src = 'app.js';
      document.head.appendChild(app);
    };
    document.head.appendChild(pyo);
  })();
</script>
<style>
@font-face {
  font-family: 'Brawl Stars';
  src: url('fonts/lilitaone-regular-webfont.ttf') format('truetype');
}
@font-face {
  font-family: 'Brawl Stars Bold';
  src: url('fonts/nougat-extrablack-webfont.ttf') format('truetype');
}

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Tokens ── */
:root {
  --bg:           #0c0c10;
  --surface:      rgba(255,255,255,0.045);
  --surface-hi:   rgba(255,255,255,0.075);
  --border:       rgba(255,255,255,0.07);
  --border-hi:    rgba(255,255,255,0.14);
  --gold:         #ffd60a;
  --gold-dim:     rgba(255,214,10,0.18);
  --gold-glow:    rgba(255,214,10,0.28);
  --text:         #f5f5f7;
  --text-2:       rgba(245,245,247,0.48);
  --text-3:       rgba(245,245,247,0.28);
  --radius:       18px;
  --radius-sm:    12px;
  --icon:         66px;
  --transition:   0.18s cubic-bezier(0.4,0,0.2,1);
}

/* ── Base ── */
html { scroll-behavior: smooth; }
body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 5rem 1.5rem 7rem;
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  color: var(--text);
  background:
    radial-gradient(ellipse 70% 40% at 15% 0%,   rgba(255,214,10,0.07) 0%, transparent 100%),
    radial-gradient(ellipse 60% 50% at 85% 100%,  rgba(80,80,220,0.06) 0%, transparent 100%),
    var(--bg);
  background-attachment: fixed;
}

/* ── Header ── */
header {
  text-align: center;
  max-width: 560px;
  margin-bottom: 4rem;
}

h1 {
  font-family: 'Brawl Stars Bold', sans-serif;
  font-size: clamp(2rem, 5.5vw, 3.2rem);
  letter-spacing: -0.01em;
  line-height: 1.08;
  margin-bottom: 1rem;
  background: linear-gradient(160deg, #ffffff 30%, rgba(255,255,255,0.6) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.subtitle {
  font-size: 0.95rem;
  line-height: 1.6;
  color: var(--text-2);
  font-weight: 400;
  max-width: 420px;
  margin: 0 auto;
}

/* ── Main content ── */
.content {
  width: 100%;
  max-width: 980px;
}

/* ── Picker controls bar ── */
.picker-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
  padding: 0 0.25rem;
}

.picker-header h2 {
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-3);
}

#sortToggle {
  font-family: inherit;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 0.38rem 0.9rem;
  border-radius: 100px;
  border: 1px solid var(--border-hi);
  background: var(--surface);
  color: var(--text-2);
  cursor: pointer;
  transition: background var(--transition), color var(--transition), border-color var(--transition);
}
#sortToggle:hover {
  background: var(--surface-hi);
  color: var(--text);
  border-color: rgba(255,255,255,0.22);
}

/* ── Icon grid ── */
.icon-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, var(--icon));
  justify-content: center;
  gap: 0.45rem;
  margin-bottom: 2.5rem;
}

.icon-grid img {
  width: var(--icon);
  height: var(--icon);
  object-fit: cover;
  border-radius: 14px;
  background: var(--surface);
  cursor: pointer;
  outline: 2px solid transparent;
  outline-offset: 2px;
  transition: transform var(--transition), box-shadow var(--transition), outline-color var(--transition);
  will-change: transform;
}
.icon-grid img:hover {
  transform: scale(1.09);
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
}
.icon-grid img.selected {
  outline-color: var(--gold);
  box-shadow: 0 0 0 4px var(--gold-glow), 0 8px 24px rgba(0,0,0,0.5);
  transform: scale(1.09);
}

/* ── Go button ── */
.go-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: 3.5rem;
}

#go {
  font-family: inherit;
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: 0.01em;
  padding: 0.85rem 3.25rem;
  border-radius: 100px;
  border: none;
  background: var(--gold);
  color: #000;
  cursor: pointer;
  box-shadow: 0 4px 28px var(--gold-dim);
  transition: transform var(--transition), box-shadow var(--transition);
}
#go:hover  { transform: scale(1.04); box-shadow: 0 6px 36px var(--gold-glow); }
#go:active { transform: scale(0.97); }

/* ── Results ── */
#output {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}

.row {
  display: flex;
  align-items: center;
  gap: 1.25rem;
  padding: 1.1rem 1.4rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  animation: fadeUp 0.25s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* stagger children */
.row:nth-child(1) { animation-delay: 0.00s; }
.row:nth-child(2) { animation-delay: 0.05s; }
.row:nth-child(3) { animation-delay: 0.10s; }
.row:nth-child(4) { animation-delay: 0.15s; }
.row:nth-child(5) { animation-delay: 0.20s; }

.subject-icon {
  width: 54px;
  height: 54px;
  object-fit: cover;
  border-radius: 10px;
  background: var(--surface);
  flex-shrink: 0;
}

.row h3 {
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  color: var(--text-2);
  white-space: nowrap;
  flex-shrink: 0;
  min-width: 64px;
  line-height: 1.5;
}

.output-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 0.6rem;
}

.counter-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.28rem;
}

.counter-card img {
  width: 50px;
  height: 50px;
  object-fit: cover;
  border-radius: 50%;
  background: var(--surface);
  border: 1.5px solid var(--border-hi);
  transition: transform var(--transition);
}
.counter-card img:hover { transform: scale(1.1); }

.counter-card .name {
  font-size: 0.62rem;
  font-weight: 500;
  color: var(--text-2);
  text-align: center;
  max-width: 54px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* overlap accent rows */
.row.overlap-double { border-color: rgba(255,214,10,0.22); }
.row.overlap-triple {
  border-color: rgba(255,214,10,0.42);
  background: rgba(255,214,10,0.04);
}

/* ── Footer ── */
footer {
  margin-top: 5rem;
  font-size: 0.7rem;
  color: var(--text-3);
  text-align: center;
  letter-spacing: 0.03em;
}
footer strong { color: var(--text-2); font-weight: 500; }

/* ── Loading screen ── */
#loading-screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: var(--bg);
  z-index: 1000;
}
#loading-screen img {
  width: 80px;
  height: 80px;
  animation: spin 0.9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Mobile ── */
@media (max-width: 640px) {
  body { padding: 3rem 1rem 5rem; }
  header { margin-bottom: 2.5rem; }
  h1 { font-size: 1.9rem; }
  :root { --icon: 56px; }
  .icon-grid { gap: 0.35rem; }
  .row { padding: 0.9rem 1rem; gap: 0.9rem; }
  .subject-icon { width: 44px; height: 44px; }
}

@media (hover: none) and (pointer: coarse) {
  .icon-grid img,
  .counter-card img { transition: none; }
  .icon-grid img:hover { transform: none; box-shadow: none; }
  .icon-grid img.selected {
    transform: none;
    outline-color: var(--gold);
    box-shadow: 0 0 0 4px var(--gold-glow);
  }
}
</style>
</head>
<body>

<div id="loading-screen">
  <img src="loading_chester.png" alt="Loading">
</div>

<noscript>
  <p>This is the Brawler Counterpick Calculator. Select up to three brawlers and click Calculate to see your counters.</p>
</noscript>

<header>
  <h1>Brawler Counterpick<br>Calculator</h1>
  <p class="subtitle">Click on the brawlers your opponents have picked, the results will show which brawlers counter them so you can make the best pick.</p>
</header>

<div class="content">
  <div class="picker-header">
    <h2>Pick up to three brawlers</h2>
    <button id="sortToggle">Rarity</button>
  </div>
  <div id="iconGrid" class="icon-grid"></div>
  <div class="go-wrap">
    <button id="go">Calculate</button>
  </div>
  <div id="output"></div>
</div>

<footer>
  Counterpicks determined primarily from <strong>SpenLC</strong> ranking data.
</footer>

</body>
</html>
